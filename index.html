<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A0F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Travel Curator</title>

    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <style>
        :root {
            --bg: #0A0A0F;
            --bg2: #13131A;
            --bg3: #1C1C26;
            --surface: #22222E;
            --surface2: #2A2A38;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --accent: #7C6FFF;
            --accent2: #9F95FF;
            --accent-dim: rgba(124,111,255,0.15);
            --accent-glow: rgba(124,111,255,0.25);
            --text1: #F0F0F8;
            --text2: #9898B0;
            --text3: #5C5C78;
            --local: #FF8A4C;
            --local-dim: rgba(255,138,76,0.15);
            --star: #FFCB47;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bot: env(safe-area-inset-bottom, 0px);
            --nav-h: 72px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text1);
            height: 100dvh;
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* ── SCROLLABLE MAIN ── */
        #app {
            position: fixed;
            inset: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            scrollbar-width: none;
        }
        #app::-webkit-scrollbar { display: none; }

        /* ── HEADER ── */
        #site-header {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: calc(var(--safe-top) + 14px) 20px 14px;
            background: linear-gradient(to bottom, var(--bg) 60%, transparent);
            pointer-events: none;
        }
        #site-header > * { pointer-events: auto; }

        .logo {
            font-size: 19px;
            font-weight: 800;
            letter-spacing: -0.6px;
            color: var(--text1);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        #header-badge {
            display: none;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text2);
            letter-spacing: 0.3px;
        }
        #header-badge.show { display: flex; }
        #header-badge .pulse {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #4ADE80;
            box-shadow: 0 0 6px #4ADE80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(0.85)} }

        /* ── BOTTOM NAV ── */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            z-index: 50;
            padding: 12px 20px calc(var(--safe-bot) + 12px);
            background: linear-gradient(to top, var(--bg) 60%, transparent);
        }
        .nav-pill {
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 6px;
            gap: 4px;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 10px 20px;
            border-radius: 14px;
            border: none;
            background: transparent;
            color: var(--text3);
            cursor: pointer;
            transition: all 0.18s;
            flex: 1;
            font-size: 9px;
            font-weight: 700;
            font-family: 'Pretendard', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .nav-btn svg { width: 20px; height: 20px; }
        .nav-btn:active { transform: scale(0.93); }
        .nav-btn.active, .nav-btn:hover { color: var(--text1); background: var(--bg3); }
        .nav-btn.accent { color: var(--accent2); }
        .nav-btn.accent:hover, .nav-btn.accent:active { background: var(--accent-dim); }
        #btn-back { display: none; }
        #btn-back.show { display: flex; }

        /* ── SECTION: COUNTRIES ── */
        .section-wrap {
            padding: 0 16px calc(var(--nav-h) + var(--safe-bot) + 20px);
            animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(14px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .page-hero {
            padding: 4px 4px 20px;
        }
        .page-eyebrow {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent2);
            margin-bottom: 8px;
        }
        .page-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1.2px;
            line-height: 1.1;
            color: var(--text1);
        }
        .page-sub {
            font-size: 13px;
            font-weight: 500;
            color: var(--text3);
            margin-top: 6px;
        }

        /* Country Cards */
        .country-grid { display: flex; flex-direction: column; gap: 12px; }

        .country-card {
            position: relative;
            border-radius: 22px;
            overflow: hidden;
            height: 150px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--border);
        }
        .country-card:active { transform: scale(0.97); }
        .country-card img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
            filter: brightness(0.55) saturate(1.1);
        }
        .country-card:hover img { transform: scale(1.04); }
        .country-card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(110deg, rgba(0,0,0,0.55) 0%, transparent 60%);
        }
        .country-card-body {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 22px;
        }
        .country-card-left { display: flex; flex-direction: column; gap: 3px; }
        .country-name {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.8px;
            color: #fff;
            line-height: 1;
        }
        .country-count {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.5px;
        }
        .country-arrow {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            backdrop-filter: blur(8px);
        }

        /* ── SECTION: CITIES ── */
        .city-list { display: flex; flex-direction: column; gap: 8px; }

        .city-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.18s;
        }
        .city-row:active { transform: scale(0.97); background: var(--surface2); }
        .city-emoji {
            width: 46px; height: 46px;
            border-radius: 14px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .city-info { flex: 1; min-width: 0; }
        .city-name {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.4px;
            color: var(--text1);
        }
        .city-meta {
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
            margin-top: 2px;
        }
        .city-chevron { color: var(--text3); flex-shrink: 0; }

        /* ── SECTION: SPOTS ── */

        /* Sticky filter bar */
        .filter-bar {
            position: sticky;
            top: 0;
            z-index: 40;
            padding: 10px 16px 10px;
            margin: 0 -16px;
            background: var(--bg);
        }

        /* Source toggle */
        .source-toggle {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 4px;
            gap: 4px;
            margin-bottom: 10px;
        }
        .src-btn {
            flex: 1;
            padding: 9px 0;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            font-family: 'Pretendard', sans-serif;
            color: var(--text3);
            cursor: pointer;
            transition: all 0.18s;
            letter-spacing: 0.2px;
        }
        .src-btn:active { transform: scale(0.95); }
        .src-btn.active-all  { background: var(--text1); color: var(--bg); }
        .src-btn.active-kr   { background: var(--accent); color: #fff; }
        .src-btn.active-local { background: var(--local); color: #fff; }

        /* Category chips */
        .cat-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px;
        }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-chip {
            flex-shrink: 0;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Pretendard', sans-serif;
            border: 1px solid var(--border2);
            background: var(--surface);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.18s;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        .cat-chip:active { transform: scale(0.95); }
        .cat-chip.active { background: var(--text1); color: var(--bg); border-color: var(--text1); }

        /* Spot cards — horizontal layout */
        .spot-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }

        .spot-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            height: 130px;
            cursor: pointer;
            transition: transform 0.18s;
            position: relative;
        }
        .spot-card:active { transform: scale(0.975); }
        .spot-card-img {
            width: 120px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .spot-card-img img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.9);
        }
        .spot-badge {
            position: absolute;
            top: 8px; left: 8px;
            padding: 3px 7px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            backdrop-filter: blur(8px);
        }
        .spot-badge.kr { background: rgba(124,111,255,0.85); color: #fff; }
        .spot-badge.local { background: rgba(255,138,76,0.85); color: #fff; }

        .spot-card-body {
            flex: 1;
            padding: 13px 14px 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }
        .spot-top { display: flex; flex-direction: column; gap: 3px; }
        .spot-cat-tag {
            font-size: 10px;
            font-weight: 700;
            color: var(--text3);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .spot-name {
            font-size: 15px;
            font-weight: 800;
            letter-spacing: -0.4px;
            color: var(--text1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .spot-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
        }
        .spot-rating { color: var(--star); }
        .spot-sep { color: var(--text3); opacity: 0.4; font-size: 9px; }

        .spot-bottom { display: flex; align-items: center; justify-content: space-between; }
        .spot-highlight {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text3);
            overflow: hidden;
            max-width: 65%;
        }
        .spot-highlight span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .spot-dist {
            font-size: 10px;
            font-weight: 700;
            color: #4ADE80;
            background: rgba(74,222,128,0.1);
            padding: 3px 8px;
            border-radius: 6px;
        }
        .explore-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 32px; height: 32px;
            border-radius: 10px;
            background: var(--accent-dim);
            border: 1px solid rgba(124,111,255,0.2);
            color: var(--accent2);
            text-decoration: none;
            flex-shrink: 0;
            transition: all 0.18s;
            font-size: 14px;
        }
        .explore-btn:active { transform: scale(0.9); background: var(--accent); color: #fff; }

        /* Distance mode header */
        .distance-header {
            padding: 4px 4px 16px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }
        .distance-title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.6px;
            color: var(--text1);
        }
        .distance-sub {
            font-size: 11px;
            font-weight: 600;
            color: #4ADE80;
            margin-top: 3px;
        }

        /* Empty state */
        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 20px;
            gap: 10px;
            color: var(--text3);
        }
        .empty-icon { font-size: 36px; }
        .empty-text { font-size: 13px; font-weight: 600; }

        /* Loader */
        .loader-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            gap: 14px;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--surface2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1px; }

        /* ── MODAL ── */
        #toast-modal {
            position: fixed; inset: 0;
            z-index: 200;
            display: flex; align-items: flex-end; justify-content: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
            padding-bottom: calc(var(--safe-bot) + 16px);
        }
        #toast-modal.open { opacity: 1; pointer-events: all; }
        #toast-content {
            width: 100%;
            max-width: 440px;
            margin: 0 16px;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 28px;
            padding: 28px 24px 24px;
            transform: translateY(24px);
            transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
        }
        #toast-modal.open #toast-content { transform: translateY(0); }

        .modal-icon {
            width: 52px; height: 52px;
            border-radius: 16px;
            background: var(--accent-dim);
            border: 1px solid rgba(124,111,255,0.2);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 18px;
            color: var(--accent2);
        }
        .modal-title {
            font-size: 20px; font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text1);
            margin-bottom: 8px;
        }
        .modal-body {
            font-size: 13px; font-weight: 500;
            color: var(--text2); line-height: 1.6;
            margin-bottom: 6px;
        }
        .modal-note {
            font-size: 11px; font-weight: 600;
            color: var(--text3);
            margin-bottom: 24px;
        }
        .modal-actions { display: flex; gap: 10px; }
        .modal-btn {
            flex: 1; padding: 14px;
            border-radius: 14px;
            font-size: 14px; font-weight: 800;
            font-family: 'Pretendard', sans-serif;
            cursor: pointer;
            transition: all 0.18s;
            border: none;
            letter-spacing: -0.2px;
        }
        .modal-btn:active { transform: scale(0.96); }
        .modal-btn-cancel {
            background: var(--surface2);
            color: var(--text2);
        }
        .modal-btn-confirm {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .modal-btn-confirm:hover { background: var(--accent2); }
    </style>
</head>
<body>

    <div id="app">
        <header id="site-header">
            <div class="logo" onclick="router.home()">
                <div class="logo-dot"></div>
                Kornect
            </div>
            <div id="header-badge">
                <div class="pulse"></div>
                <span id="badge-text">Paris</span>
            </div>
        </header>

        <div id="page-content">
            <div class="loader-wrap">
                <div class="spinner"></div>
                <p class="loader-text">데이터 불러오는 중…</p>
            </div>
        </div>

        <div style="height: calc(var(--nav-h) + var(--safe-bot) + 20px)"></div>
    </div>

    <nav id="bottom-nav">
        <div class="nav-pill">
            <button class="nav-btn" id="btn-back" onclick="router.back()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                뒤로
            </button>
            <button class="nav-btn active" onclick="router.home()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                홈
            </button>
            <button class="nav-btn accent" onclick="router.sortByDistance()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                내 주변
            </button>
        </div>
    </nav>

    <div id="toast-modal">
        <div id="toast-content">
            <div class="modal-icon">
                <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </div>
            <h3 class="modal-title">현재 위치 사용</h3>
            <p class="modal-body">가까운 장소를 거리순으로 탐색할게요.</p>
            <p class="modal-note">거절하면 파리 기준으로 탐색합니다.</p>
            <div class="modal-actions">
                <button id="toast-cancel" class="modal-btn modal-btn-cancel">건너뛰기</button>
                <button id="toast-confirm" class="modal-btn modal-btn-confirm">📍 위치 허용</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_URL: 'https://script.google.com/macros/s/AKfycbybqqQ3THQd1zdlXWQMSSIiIoqMXrG5fGJSxfzah7rU3gOQe3fReN0Iu-oAhTZ7EQ3M/exec',
            TARGET_COUNTRIES: ['프랑스', '일본', '영국', '이탈리아'],
            COUNTRY_IMGS: {
                '프랑스': 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=800&q=80',
                '일본': 'https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d?w=800&q=80',
                '영국': 'https://cdn.pixabay.com/photo/2019/08/19/12/31/street-4416306_1280.jpg',
                '이탈리아': 'https://cdn.pixabay.com/photo/2019/10/06/08/57/tiber-river-4529605_1280.jpg'
            }
        };

        const STATE = { data: [], country: null, city: null, sourceFilter: 'ALL', category: 'all', userLat: null, userLng: null };

        const $ = id => document.getElementById(id);
        const content = () => $('page-content');

        const router = {
            init: async () => {
                try {
                    const response = await fetch(CONFIG.API_URL);
                    const json = await response.json();
                    if (!json || json.length === 0) throw new Error("No Data");
                    STATE.data = json;
                    router.home();
                } catch (error) {
                    console.error(error);
                    content().innerHTML = `
                        <div class="section-wrap" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;text-align:center">
                            <span style="font-size:40px">⚠️</span>
                            <h3 style="font-weight:800;font-size:18px;color:var(--text1)">데이터를 불러올 수 없어요</h3>
                            <p style="font-size:13px;color:var(--text3)">API URL을 확인하거나 잠시 후 다시 시도해주세요.</p>
                            <button onclick="location.reload()" style="padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:800;font-family:'Pretendard',sans-serif;cursor:pointer;margin-top:6px">새로고침</button>
                        </div>`;
                }
            },

            home: () => {
                STATE.country = null; STATE.city = null;
                ui.setBadge('');
                ui.toggleBack(false);
                render.countries();
                $('app').scrollTo({ top: 0 });
            },

            selectCountry: (c) => {
                STATE.country = c;
                ui.setBadge(c);
                ui.toggleBack(true);
                render.cities();
                $('app').scrollTo({ top: 0 });
            },

            selectCity: (c) => {
                STATE.city = c;
                STATE.sourceFilter = 'ALL';
                STATE.category = 'all';
                ui.toggleBack(true);
                render.spots();
                $('app').scrollTo({ top: 0 });
            },

            setSource: (type) => { STATE.sourceFilter = type; render.spots(); },
            setCategory: (cat) => { STATE.category = cat; render.spots(); },

            back: () => {
                if (STATE.city) router.selectCountry(STATE.country);
                else router.home();
            },

            sortByDistance: () => {
                if (STATE.userLat && STATE.userLng) {
                    ui.loader();
                    setTimeout(() => processDistance(STATE.userLat, STATE.userLng), 50);
                    return;
                }

                ui.showToast((isConfirmed) => {
                    ui.loader();
                    if (isConfirmed) {
                        if (!navigator.geolocation) {
                            ui.loader(false);
                            return alert("GPS 권한이 필요합니다.");
                        }
                        const geoOptions = { enableHighAccuracy: false, maximumAge: 10 * 60 * 1000, timeout: 5000 };
                        navigator.geolocation.getCurrentPosition(pos => {
                            STATE.userLat = pos.coords.latitude;
                            STATE.userLng = pos.coords.longitude;
                            processDistance(STATE.userLat, STATE.userLng);
                        }, (err) => {
                            console.warn("GPS Error:", err);
                            alert("위치 정보를 가져올 수 없어 기본 위치(파리)로 대체합니다.");
                            processDistance(48.8566, 2.3522);
                        }, geoOptions);
                    } else {
                        processDistance(48.8566, 2.3522);
                    }
                });

                function processDistance(lat, lng) {
                    let targets = STATE.city ? STATE.data.filter(i => i.city === STATE.city) : [...STATE.data];
                    targets.forEach(item => item._dist = getDistance(lat, lng, item.lat, item.lng));
                    targets.sort((a, b) => a._dist - b._dist);
                    render.spotsList(targets, true);
                    ui.toggleBack(true);
                    ui.setBadge('Near Me');
                }
            }
        };

        const render = {
            countries: () => {
                const list = CONFIG.TARGET_COUNTRIES;
                content().innerHTML = `
                <div class="section-wrap">
                    <div class="page-hero">
                        <p class="page-eyebrow">Curated by Kornect</p>
                        <h2 class="page-title">어디로<br>떠나시나요?</h2>
                        <p class="page-sub">${STATE.data.length}개의 큐레이션 장소</p>
                    </div>
                    <div class="country-grid">
                        ${list.map(c => `
                            <div class="country-card" onclick="router.selectCountry('${c}')">
                                <img src="${CONFIG.COUNTRY_IMGS[c]}" loading="lazy" alt="${c}">
                                <div class="country-card-overlay"></div>
                                <div class="country-card-body">
                                    <div class="country-card-left">
                                        <span class="country-name">${c}</span>
                                        <span class="country-count">${STATE.data.filter(i=>i.country===c).length} PLACES</span>
                                    </div>
                                    <div class="country-arrow">
                                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            },

            cities: () => {
                const list = [...new Set(STATE.data.filter(i => i.country === STATE.country).map(i => i.city))];
                content().innerHTML = `
                <div class="section-wrap">
                    <div class="page-hero">
                        <p class="page-eyebrow">${STATE.country}</p>
                        <h2 class="page-title">도시를<br>선택하세요</h2>
                    </div>
                    <div class="city-list">
                        ${list.length > 0 ? list.map(city => `
                            <div class="city-row" onclick="router.selectCity('${city}')">
                                <div class="city-emoji">${getCityEmoji(city)}</div>
                                <div class="city-info">
                                    <div class="city-name">${city}</div>
                                    <div class="city-meta">${STATE.data.filter(i=>i.city===city).length}개 큐레이션</div>
                                </div>
                                <div class="city-chevron">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                                </div>
                            </div>
                        `).join('') : '<div class="empty-state"><span class="empty-icon">🗺</span><p class="empty-text">등록된 도시가 없습니다</p></div>'}
                    </div>
                </div>`;
            },

            spots: () => {
                let items = STATE.data.filter(i => i.country === STATE.country && i.city === STATE.city);
                if (STATE.sourceFilter === 'KR') {
                    items = items.filter(i => i.source_type && i.source_type.toString().includes('KR'));
                } else if (STATE.sourceFilter === 'LOCAL') {
                    items = items.filter(i => i.source_type && (i.source_type.toString().includes('LOCAL') || i.source_type.toString().includes('현지')));
                }
                if (STATE.category !== 'all') items = items.filter(i => i.category_main === STATE.category);
                render.spotsList(items, false);
            },

            spotsList: (items, isDistanceMode) => {
                let contextItems = STATE.data;
                if (STATE.country) contextItems = contextItems.filter(i => i.country === STATE.country);
                if (STATE.city) contextItems = contextItems.filter(i => i.city === STATE.city);
                const dynamicCategories = ['all', ...new Set(contextItems.map(i => i.category_main))].filter(Boolean);

                const isKR = STATE.sourceFilter === 'KR';
                const isLocal = STATE.sourceFilter === 'LOCAL';

                const filterHtml = isDistanceMode ? `
                    <div class="distance-header">
                        <div>
                            <div class="distance-title">내 주변 장소</div>
                            <div class="distance-sub">📍 거리순 정렬</div>
                        </div>
                    </div>` : `
                    <div class="filter-bar">
                        <div class="source-toggle">
                            <button class="src-btn ${!isKR && !isLocal ? 'active-all' : ''}" onclick="router.setSource('ALL')">전체</button>
                            <button class="src-btn ${isKR ? 'active-kr' : ''}" onclick="router.setSource('KR')">🇰🇷 한국인픽</button>
                            <button class="src-btn ${isLocal ? 'active-local' : ''}" onclick="router.setSource('LOCAL')">🌍 현지인픽</button>
                        </div>
                        <div class="cat-scroll">
                            ${dynamicCategories.map(c => `
                                <button class="cat-chip ${STATE.category === c ? 'active' : ''}" onclick="router.setCategory('${c}')">
                                    ${c === 'all' ? '전체' : c}
                                </button>
                            `).join('')}
                        </div>
                    </div>`;

                const listHtml = `
                    <div class="spot-list">
                        ${items.map(item => {
                            const isKrItem = item.source_type && item.source_type.toString().includes('KR');
                            const highlight = item.highlights && item.highlights[0] ? item.highlights[0] : '';
                            return `
                            <div class="spot-card">
                                <div class="spot-card-img">
                                    <img src="${parseImageUrl(item.image_url)}" loading="lazy" alt="${item.name}">
                                    <span class="spot-badge ${isKrItem ? 'kr' : 'local'}">${isKrItem ? 'PICK' : 'LOCAL'}</span>
                                </div>
                                <div class="spot-card-body">
                                    <div class="spot-top">
                                        <div class="spot-cat-tag">${item.category_sub || item.category_main || ''}</div>
                                        <div class="spot-name">${item.name}</div>
                                        <div class="spot-meta">
                                            <span class="spot-rating">★ ${item.rating}</span>
                                            <span class="spot-sep">•</span>
                                            <span>${item.price_level}</span>
                                            <span class="spot-sep">•</span>
                                            <span>${item.review_count}</span>
                                        </div>
                                    </div>
                                    <div class="spot-bottom">
                                        ${item._dist
                                            ? `<div class="spot-dist">📍 ${item._dist.toFixed(1)}km</div>`
                                            : highlight
                                                ? `<div class="spot-highlight"><span>✦</span><span>${highlight}</span></div>`
                                                : '<div></div>'
                                        }
                                        <a href="${item.map_url}" target="_blank" class="explore-btn" onclick="event.stopPropagation()">
                                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                                        </a>
                                    </div>
                                </div>
                            </div>`;
                        }).join('')}
                        ${items.length === 0 ? `
                            <div class="empty-state">
                                <span class="empty-icon">🤔</span>
                                <p class="empty-text">조건에 맞는 장소가 없습니다</p>
                            </div>` : ''}
                    </div>`;

                content().innerHTML = `<div class="section-wrap">${filterHtml}${listHtml}</div>`;
            }
        };

        function parseImageUrl(url) {
            if (!url) return 'https://via.placeholder.com/400x300?text=No+Image';
            if (url.includes('drive.google.com/uc')) {
                const idMatch = url.match(/id=([^&]+)/);
                if (idMatch && idMatch[1]) return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w1000`;
            }
            return url;
        }

        const ui = {
            setBadge: (text) => {
                const el = $('header-badge');
                $('badge-text').innerText = text;
                el.classList.toggle('show', !!text);
            },
            toggleBack: (show) => {
                $('btn-back').classList.toggle('show', show);
            },
            loader: () => {
                content().innerHTML = `
                    <div class="loader-wrap">
                        <div class="spinner"></div>
                        <p class="loader-text">탐색 중…</p>
                    </div>`;
            },
            showToast: (callback) => {
                const modal = $('toast-modal');
                modal.classList.add('open');
                const close = (result) => {
                    callback(result);
                    modal.classList.remove('open');
                };
                $('toast-confirm').onclick = () => close(true);
                $('toast-cancel').onclick = () => close(false);
            }
        };

        function getDistance(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lat2) return 9999;
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function getCityEmoji(city) {
            const map = { '파리': '🥐', '니스': '🌊', '도쿄': '🗼', '오사카': '🐙', '다낭': '🥥', '호이안': '🏮', '런던': '🇬🇧', '로마': '🍝', '포지타노': '🍋', '뉴욕': '🗽' };
            return map[city] || '🗺';
        }

        router.init();
    </script>
</body>
</html>
